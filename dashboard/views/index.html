<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaticPress Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">StaticPress</h1>
            <div class="flex items-center gap-4">
                <span class="text-gray-600">{{.SiteURL}}</span>
                <a href="/static" target="_blank" class="text-blue-600 hover:underline">Preview</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-gray-500 text-sm font-medium">Exported Pages</h3>
                <p class="text-3xl font-bold text-gray-900">{{.PagesCount}}</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-gray-500 text-sm font-medium">Total Exports</h3>
                <p class="text-3xl font-bold text-gray-900">{{len .Exports}}</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-gray-500 text-sm font-medium">Status</h3>
                <p class="text-3xl font-bold text-green-600">Ready</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow mb-8">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">Actions</h2>
            </div>
            <div class="p-6 flex gap-4">
                <button 
                    hx-post="/export" 
                    hx-indicator=".loading"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    <span class="loading">Export Site</span>
                </button>
                <button 
                    hx-post="/deploy" 
                    class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                    Deploy to S3
                </button>
                <a 
                    href="http://localhost:8080" 
                    target="_blank"
                    class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
                    Preview Site
                </a>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">Export History</h2>
            </div>
            <div class="p-6">
                {{if .Exports}}
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-gray-500 text-sm">
                            <th class="pb-3">Time</th>
                            <th class="pb-3">Pages</th>
                            <th class="pb-3">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{range .Exports}}
                        <tr class="border-t">
                            <td class="py-3">{{.Timestamp}}</td>
                            <td class="py-3">{{.Pages}}</td>
                            <td class="py-3">
                                <span class="px-2 py-1 rounded text-sm {{if eq .Status "completed"}}bg-green-100 text-green-800{{else}}bg-yellow-100 text-yellow-800{{end}}">
                                    {{.Status}}
                                </span>
                            </td>
                        </tr>
                        {{end}}
                    </tbody>
                </table>
                {{else}}
                <p class="text-gray-500 text-center py-4">No exports yet</p>
                {{end}}
            </div>
        </div>
    </main>
</body>
</html>
